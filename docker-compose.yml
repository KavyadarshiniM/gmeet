version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - CLAUDE_API_KEY=AIzaSyBxMR_UiyPHgeAZ99FUMUvj2IEd5dGK30M
      - MONGODB_URL=mongodb+srv://kishoresankarg23cse_db_user:1234%40sankar@cluster0.1cmrszx.mongodb.net/
      - DATABASE_NAME=meeting_notes_db
      - ENVIRONMENT=development
      - DEBUG=True
    depends_on:
      - mongo
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
